# PaddleOCR-VL Pipeline Helm Chart Values
# Adapter (pipeline) + Gotenberg (doc converter)
# VLM brain model hosted on MLIS, accessed via URL + API key.

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Gotenberg — Document-to-PDF converter (CPU only, no GPU)
gotenberg:
  enabled: true
  replicaCount: 1
  image:
    repository: gotenberg/gotenberg
    tag: "8"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 15
    periodSeconds: 30
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
  securityContext:
    runAsNonRoot: true
    runAsUser: 1001
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# PaddleOCR VL Adapter — Clean pipeline (replaces broken PaddleX)
vlApi:
  enabled: true
  replicaCount: 1
  image:
    repository: caovd/paddleocr-vl-adapter
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: "2"
      memory: 4Gi
    limits:
      cpu: "4"
      memory: 8Gi
  startupProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 30
  livenessProbe:
    httpGet:
      path: /health
      port: http
    periodSeconds: 30
    failureThreshold: 5
  readinessProbe:
    httpGet:
      path: /health
      port: http
    periodSeconds: 10
    failureThreshold: 3
  securityContext: {}
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

  pipeline:
    vlmServerUrl: "http://<mlis-deployment-name>.<namespace>.svc.cluster.local/v1"
    vlmModelName: "PaddlePaddle/PaddleOCR-VL"
    layoutEnabled: true
    layoutDevice: "cpu"
    layoutThreshold: 0.3
    layoutModelRepo: "SWHL/PP-DocLayout-V2-ONNX"
    layoutModelFile: "model.onnx"
    # HuggingFace token for downloading gated/private layout model
    hfToken: ""

  mlisAuth:
    enabled: false
    existingSecret: ""
    existingSecretKey: "api-key"
    apiKey: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podSecurityContext: {}

# HPE EZUA / AIE BYOA
ezua:
  virtualService:
    endpoint: "${RELEASE_NAME}-${NAMESPACE}.${DOMAIN_NAME}"
    istioGateway: "istio-system/ezaf-gateway"
