{{- if .Values.gotenberg.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "paddleocr-vl-pipeline.gotenberg.fullname" . }}
  labels:
    {{- include "paddleocr-vl-pipeline.labels" . | nindent 4 }}
    app.kubernetes.io/component: gotenberg
spec:
  type: {{ .Values.gotenberg.service.type }}
  ports:
    - port: {{ .Values.gotenberg.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "paddleocr-vl-pipeline.gotenberg.selectorLabels" . | nindent 4 }}
{{- end }}
